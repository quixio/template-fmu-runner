# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: Test Source
    application: test-source
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: output
        inputType: OutputTopic
        description: Topic to publish simulation requests to.
        required: true
        value: simulation
      - name: MODEL_FILENAME
        inputType: FreeText
        description: Name of the FMU file to simulate.
        required: true
        value: BouncingBall.fmu

  - name: FMU Runner
    application: fmu-runner
    version: latest
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        description: Name of the input topic to listen to.
        required: true
        value: simulation
      - name: output
        inputType: OutputTopic
        description: Name of the output topic to write simulation results to.
        required: true
        value: simulation-results

# This section describes the Topics of the data pipeline
topics:
  - name: simulation
    dataTier: Bronze
  - name: simulation-results
    dataTier: Silver
